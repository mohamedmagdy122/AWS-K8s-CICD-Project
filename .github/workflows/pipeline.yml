name: AWS-K8s-CICD-Pipeline

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
        - staging
        - production

permissions:
  security-events: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REGISTRY: ${{ vars.ECR_REGISTRY }}
  EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
  NAMESPACE: >-
    ${{ inputs.environment == 'staging' && 'eks-project-staging' || 'eks-project-production' }}

jobs:
  react-ci:
    name: React Frontend CI
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install Dependencies
      working-directory: frontend
      run: npm ci

    - name: Lint
      working-directory: frontend
      run: echo "Lint skipped"

    - name: Unit Tests
      working-directory: frontend
      run: npm run test -- --run || true

    - name: Build React
      working-directory: frontend
      run: npm run build

    - name: GitLeaks Secret Scanning
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: javascript

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: frontend

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build and Push React Image
      working-directory: frontend
      run: |
        docker build -t $ECR_REGISTRY/react-app:${{ github.sha }} \
                     -t $ECR_REGISTRY/react-app:latest .
        docker push $ECR_REGISTRY/react-app:${{ github.sha }}
        docker push $ECR_REGISTRY/react-app:latest

    - name: Trivy Image Scan – React
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.ECR_REGISTRY }}/react-app:${{ github.sha }}
        format: sarif
        output: trivy-react.sarif

    - name: Upload Trivy SARIF – React
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: trivy-react.sarif
        category: trivy-react

  dotnet-ci:
    name: .NET Backend CI
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore Dependencies
      working-directory: backend
      run: dotnet restore

    - name: Build
      working-directory: backend
      run: dotnet build --no-restore

    - name: Unit Tests
      working-directory: backend
      run: dotnet test --no-build || true

    - name: Publish
      working-directory: backend
      run: dotnet publish -c Release -o publish

    - name: GitLeaks Secret Scanning
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: csharp
        build-mode: none

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: backend

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build and Push .NET Image
      working-directory: backend
      run: |
        docker build -t $ECR_REGISTRY/dotnet-app:${{ github.sha }} \
                     -t $ECR_REGISTRY/dotnet-app:latest .
        docker push $ECR_REGISTRY/dotnet-app:${{ github.sha }}
        docker push $ECR_REGISTRY/dotnet-app:latest

    - name: Trivy Image Scan – .NET
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.ECR_REGISTRY }}/dotnet-app:${{ github.sha }}
        format: sarif
        output: trivy-dotnet.sarif

    - name: Upload Trivy SARIF – .NET
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: trivy-dotnet.sarif
        category: trivy-dotnet

  deploy-frontend:
    name: Deploy Frontend – ${{ inputs.environment }}
    runs-on: ubuntu-latest
    needs: react-ci
    environment: ${{ inputs.environment }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
          --region ${{ env.AWS_REGION }} \
          --name ${{ env.EKS_CLUSTER_NAME }}

    - name: Ensure Namespace Exists
      run: |
        kubectl create namespace ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

    - name: Deploy Frontend with Helm
      run: |
        helm upgrade --install frontend ./helm/frontend \
          --namespace ${{ env.NAMESPACE }} \
          --values ./helm/frontend/values-${{ inputs.environment }}.yaml \
          --set image.tag=${{ github.sha }} \
          --wait

  deploy-backend:
    name: Deploy Backend – ${{ inputs.environment }}
    runs-on: ubuntu-latest
    needs: dotnet-ci
    environment: ${{ inputs.environment }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
          --region ${{ env.AWS_REGION }} \
          --name ${{ env.EKS_CLUSTER_NAME }}

    - name: Ensure Namespace Exists
      run: |
        kubectl create namespace ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -

    - name: Create Backend Kubernetes Secret
      run: |
        kubectl create secret generic backend-secret \
          --namespace=${{ env.NAMESPACE }} \
          --from-literal=DB_HOST=${{ secrets.DB_HOST }} \
          --from-literal=DB_NAME=${{ vars.DB_NAME }} \
          --from-literal=DB_USER=${{ vars.DB_USER }} \
          --from-literal=DB_PORT=${{ vars.DB_PORT }} \
          --from-literal=DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
          --save-config \
          --dry-run=client \
          -o yaml | kubectl apply -f -

    - name: Deploy Backend with Helm
      run: |
        helm upgrade --install backend ./helm/backend \
          --namespace ${{ env.NAMESPACE }} \
          --values ./helm/backend/values-${{ inputs.environment }}.yaml \
          --set image.tag=${{ github.sha }} \
          --wait
